# TrendRadar 配置文件
# 为 joee 定制 - 2026-03-29

app:
  name: "joee 的热点追踪"
  version: "5.4.0"
  timezone: "Asia/Shanghai"
  language: "zh-CN"

# AI 配置 - 用 joee 的阿里云 Coding Plan
ai:
  model: "aliyun/qwen3.5-plus"
  api_key: "${AI_API_KEY}"  # 从环境变量读取
  api_base: "https://coding.dashscope.aliyuncs.com/v1"
  
  # AI 分析
  analysis:
    enabled: true
    mode: "daily"  # 每天分析
    include_rank_timeline: true
    include_standalone: true

# 报告配置
report:
  mode: "daily"  # 每日汇总
  sort_by_position_first: true
  max_news_per_keyword: 10

# 推送配置 - Telegram（OpenClaw 已配置微信通道）
notification:
  # Telegram 推送
  telegram:
    enabled: true
    bot_token: "${{ secrets.TELEGRAM_BOT_TOKEN }}"
    chat_id: "${{ secrets.TELEGRAM_CHAT_ID }}"
  
  # 推送时间窗口 - 关闭（立即推送）
  schedule:
    enabled: false

# 平台配置
platforms:
  # 启用的平台
  enabled:
    - zhihu
    - sspai
    - v2ex
    - github-trending
    - hackernews

# 存储配置
storage:
  type: "sqlite"
  retention_days: 7  # 保留 7 天数据

# 高级配置
advanced:
  debug: false
  dry_run: false  # 设置为 true 测试不推送
